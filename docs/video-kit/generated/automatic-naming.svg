<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Automatic naming animation">
  <style>
    .bg { fill: #f7f9fc; }
    .panel { fill: #ffffff; stroke: #d6deea; stroke-width: 2; }
    .title { fill: #182230; font: 700 34px Inter, Segoe UI, Arial, sans-serif; }
    .label { fill: #53627a; font: 600 18px Inter, Segoe UI, Arial, sans-serif; }
    .body { fill: #182230; font: 500 24px Inter, Segoe UI, Arial, sans-serif; }
    .small { fill: #53627a; font: 500 16px Inter, Segoe UI, Arial, sans-serif; }
    .mono { fill: #182230; font: 600 22px Consolas, Menlo, monospace; }
    .chip { fill: #edf3ff; stroke: #b9ccf6; stroke-width: 1.5; }
    .blue { fill: #1d5fd1; }
    .green { fill: #147a4f; }
    .red { fill: #c93a3a; }
    .amber { fill: #b66a04; }
    .purple { fill: #6f48c9; }
    .stroke-blue { stroke: #1d5fd1; }
    .stroke-green { stroke: #147a4f; }
    .stroke-muted { stroke: #53627a; }
    .fade-in { opacity: 0; animation: fade 6s infinite; }
    .draw { stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 6s infinite; }
    @keyframes fade {
      0%, 10% { opacity: 0; transform: translateY(8px); }
      20%, 72% { opacity: 1; transform: translateY(0); }
      90%, 100% { opacity: 0; transform: translateY(-4px); }
    }
    @keyframes draw {
      0%, 18% { stroke-dashoffset: 500; opacity: 0; }
      32%, 78% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
  </style>
  <rect class="bg" width="1280" height="720"/>
  
  <text class="title" x="72" y="78">Automatic Jira Naming</text>
  <text class="small" x="72" y="112">Fictitious example data for public docs and demo inserts</text>

  <rect class="panel" x="72" y="156" width="540" height="430" rx="18"/>
  <text class="label" x="106" y="204">Local Task Inputs</text>
  <text class="small" x="106" y="236">Project</text>
  <rect x="106" y="256" width="445" height="42" rx="10" fill="#fff" stroke="#1d5fd1" stroke-width="2"/>
  <text class="body" x="124" y="285">F1 Car Simulator</text>
  <text class="small" x="106" y="314">Area</text>
  <rect x="106" y="334" width="445" height="42" rx="10" fill="#fff" stroke="#147a4f" stroke-width="2"/>
  <text class="body" x="124" y="363">Gameplay</text>
  <text class="small" x="106" y="392">Scope</text>
  <rect x="106" y="412" width="445" height="42" rx="10" fill="#fff" stroke="#6f48c9" stroke-width="2"/>
  <text class="body" x="124" y="441">Pit Stop Polish</text>
  <text class="small" x="106" y="470">Task</text>
  <rect x="106" y="490" width="445" height="42" rx="10" fill="#fff" stroke="#b66a04" stroke-width="2"/>
  <text class="body" x="124" y="519">Smooth pit entry steering assist</text>

  <path class="draw stroke-blue" d="M638 365 C692 365 692 250 735 250" fill="none" stroke-width="6" stroke-linecap="round"/>
  <path class="draw stroke-green" d="M638 405 C692 405 692 454 735 454" fill="none" stroke-width="6" stroke-linecap="round" style="animation-delay:.6s"/>

  <g class="fade-in" style="animation-delay:.4s">
    <rect class="panel" x="736" y="176" width="472" height="150" rx="18"/>
    <text class="label" x="770" y="222">Epic Summary</text>
    <text class="mono" x="770" y="270">[F1 Car Simulator] [Gameplay]</text>
    <text class="mono" x="770" y="304">Pit Stop Polish</text>
  </g>

  <g class="fade-in" style="animation-delay:1s">
    <rect class="panel" x="736" y="382" width="472" height="150" rx="18"/>
    <text class="label" x="770" y="428">Story/Bug Summary</text>
    <text class="mono" x="770" y="480">[Gameplay] Smooth pit entry</text>
    <text class="mono" x="770" y="514">steering assist</text>
  </g>
  
</svg>
