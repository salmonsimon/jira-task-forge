<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Automatic naming animation">
  <style>
    .bg { fill: #151719; }
    .panel { fill: #1d1f23; stroke: #454852; stroke-width: 2; }
    .raised { fill: #25272c; stroke: #454852; stroke-width: 2; }
    .input { fill: #22252a; stroke: #454852; stroke-width: 2; }
    .title { fill: #f4f5f7; font: 700 32px Inter, Segoe UI, Arial, sans-serif; }
    .label { fill: #f4f5f7; font: 600 18px Inter, Segoe UI, Arial, sans-serif; }
    .body { fill: #f4f5f7; font: 500 22px Inter, Segoe UI, Arial, sans-serif; }
    .small { fill: #aeb3bd; font: 500 16px Inter, Segoe UI, Arial, sans-serif; }
    .tiny { fill: #aeb3bd; font: 500 14px Inter, Segoe UI, Arial, sans-serif; }
    .mono { fill: #f4f5f7; font: 600 20px Consolas, Menlo, monospace; }
    .chip { fill: #1d355c; stroke: #31588f; stroke-width: 1.5; }
    .blue { fill: #0c66e4; }
    .green { fill: #7ee2a8; }
    .red { fill: #ff9c8f; }
    .amber { fill: #f5cd47; }
    .purple { fill: #b8a7ff; }
    .stroke-blue { stroke: #0c66e4; }
    .stroke-green { stroke: #7ee2a8; }
    .stroke-muted { stroke: #aeb3bd; }
    .fade-in { opacity: 0; animation: fade 6s infinite; }
    .draw { stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 6s infinite; }
    @keyframes fade {
      0%, 10% { opacity: 0; transform: translateY(8px); }
      20%, 72% { opacity: 1; transform: translateY(0); }
      90%, 100% { opacity: 0; transform: translateY(-4px); }
    }
    @keyframes draw {
      0%, 18% { stroke-dashoffset: 500; opacity: 0; }
      32%, 78% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
  </style>
  <rect class="bg" width="1280" height="720"/>
  
  <text class="title" x="72" y="78">Automatic Jira Naming</text>
  <text class="small" x="72" y="110">Local task fields become consistent Jira summaries</text>

  <rect class="panel" x="72" y="144" width="548" height="500" rx="8"/>
  <text class="label" x="106" y="188">Local Task</text>
  <text class="tiny" x="106" y="214">Preparation Tray fields</text>
  <text class="small" x="106" y="254">Project</text>
  <rect x="106" y="268" width="474" height="48" rx="4" fill="#22252a" stroke="#85b8ff" stroke-width="2"/>
  <text class="body" x="122" y="300">F1 Car Simulator</text>
  <text class="small" x="106" y="346">Area</text>
  <rect x="106" y="360" width="474" height="48" rx="4" fill="#22252a" stroke="#7ee2a8" stroke-width="2"/>
  <text class="body" x="122" y="392">Gameplay</text>
  <text class="small" x="106" y="438">Scope</text>
  <rect x="106" y="452" width="474" height="48" rx="4" fill="#22252a" stroke="#b8a7ff" stroke-width="2"/>
  <text class="body" x="122" y="484">Pit Stop Polish</text>
  <text class="small" x="106" y="530">Task</text>
  <rect x="106" y="544" width="474" height="48" rx="4" fill="#22252a" stroke="#f5cd47" stroke-width="2"/>
  <text class="body" x="122" y="576">Smooth pit entry steering assist</text>

  <path class="draw stroke-blue" d="M650 360 C704 360 704 252 746 252" fill="none" stroke-width="5" stroke-linecap="round"/>
  <path class="draw stroke-green" d="M650 414 C704 414 704 498 746 498" fill="none" stroke-width="5" stroke-linecap="round" style="animation-delay:.6s"/>

  <g class="fade-in" style="animation-delay:.4s">
    <rect class="panel" x="746" y="166" width="462" height="176" rx="8"/>
    <rect x="770" y="190" width="54" height="24" rx="4" fill="#1d355c"/>
    <text x="782" y="207" fill="#85b8ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">EPIC</text>
    <text class="label" x="770" y="246">Epic summary</text>
    <text class="mono" x="770" y="288">[F1 Car Simulator] [Gameplay]</text>
    <text class="mono" x="770" y="320">Pit Stop Polish</text>
  </g>

  <g class="fade-in" style="animation-delay:1s">
    <rect class="panel" x="746" y="412" width="462" height="176" rx="8"/>
    <rect x="770" y="436" width="64" height="24" rx="4" fill="#183f2e"/>
    <text x="782" y="453" fill="#7ee2a8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">STORY</text>
    <text class="label" x="770" y="492">Story / Bug summary</text>
    <text class="mono" x="770" y="534">[Gameplay] Smooth pit entry</text>
    <text class="mono" x="770" y="566">steering assist</text>
  </g>
  
</svg>
