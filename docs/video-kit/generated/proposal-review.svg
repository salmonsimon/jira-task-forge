<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Proposal Review decisions animation">
  <style>
    .bg { fill: #151719; }
    .panel { fill: #1d1f23; stroke: #454852; stroke-width: 2; }
    .raised { fill: #25272c; stroke: #454852; stroke-width: 2; }
    .input { fill: #22252a; stroke: #454852; stroke-width: 2; }
    .title { fill: #f4f5f7; font: 700 32px Inter, Segoe UI, Arial, sans-serif; }
    .label { fill: #f4f5f7; font: 600 18px Inter, Segoe UI, Arial, sans-serif; }
    .body { fill: #f4f5f7; font: 500 22px Inter, Segoe UI, Arial, sans-serif; }
    .small { fill: #aeb3bd; font: 500 16px Inter, Segoe UI, Arial, sans-serif; }
    .tiny { fill: #aeb3bd; font: 500 14px Inter, Segoe UI, Arial, sans-serif; }
    .mono { fill: #f4f5f7; font: 600 20px Consolas, Menlo, monospace; }
    .chip { fill: #1d355c; stroke: #31588f; stroke-width: 1.5; }
    .blue { fill: #0c66e4; }
    .green { fill: #7ee2a8; }
    .red { fill: #ff9c8f; }
    .amber { fill: #f5cd47; }
    .purple { fill: #b8a7ff; }
    .stroke-blue { stroke: #0c66e4; }
    .stroke-green { stroke: #7ee2a8; }
    .stroke-muted { stroke: #aeb3bd; }
    .fade-in { opacity: 0; animation: fade 6s infinite; }
    .draw { stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 6s infinite; }
    @keyframes fade {
      0%, 10% { opacity: 0; transform: translateY(8px); }
      20%, 72% { opacity: 1; transform: translateY(0); }
      90%, 100% { opacity: 0; transform: translateY(-4px); }
    }
    @keyframes draw {
      0%, 18% { stroke-dashoffset: 500; opacity: 0; }
      32%, 78% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
  </style>
  <rect class="bg" width="1280" height="720"/>
  
  <rect class="panel" x="98" y="42" width="1084" height="636" rx="8"/>
  <rect x="98" y="42" width="1084" height="96" rx="8" fill="#1d1f23"/>
  <line x1="98" y1="138" x2="1182" y2="138" stroke="#454852" stroke-width="2"/>
  <circle cx="132" cy="80" r="16" fill="#1d355c"/>
  <path d="M126 80 L132 86 L141 72 M136 88 L144 80" fill="none" stroke="#85b8ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="title" x="162" y="82">Proposal review</text>
  <text class="small" x="162" y="112">[Gameplay] Smooth pit entry steering assist</text>
  <rect x="906" y="69" width="91" height="28" rx="4" fill="#533f04"/>
  <text x="951.5" y="88" text-anchor="middle" fill="#f5cd47" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Pending</text>
  <text class="tiny" x="1004" y="88">Claude · Sonnet</text>

  <rect class="raised" x="132" y="162" width="1016" height="92" rx="6"/>
  <text class="label" x="158" y="196">Review proposed Jira description changes.</text>
  <text class="small" x="158" y="224">AI drafts remain local until you resolve each section.</text>
  <rect x="944" y="184" width="174" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
  <text x="1031" y="211" text-anchor="middle" fill="#f4f5f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Request changes</text>

  <g>
    <rect class="raised" x="132" y="278" width="1016" height="88" rx="6"/>
    <text class="label" x="156" y="310">Historia de usuario</text>
    <text class="small" x="156" y="339">Improve driver control entering pit lane.</text>
    <rect x="978" y="301" width="54" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
    <path d="M993 332 L1010 315 L1018 323 L1001 340 L991 342 Z" fill="#aeb3bd"/>
    <rect x="1044" y="301" width="44" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
    <path d="M1057 315 L1075 333 M1075 315 L1057 333" stroke="#ff9c8f" stroke-width="3" stroke-linecap="round"/>
    <rect x="1100" y="301" width="44" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
    <path d="M1112 325 L1119 332 L1132 317" fill="none" stroke="#7ee2a8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g class="fade-in" style="animation-delay:0.2s">
      <rect x="972" y="300" width="176" height="44" rx="4" fill="#183f2e" stroke="#7ee2a8" stroke-width="2"/>
      <path d="M1004 329 L1011 336 L1024 321" fill="none" stroke="#7ee2a8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="1076" y="329" text-anchor="middle" fill="#7ee2a8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Accepted</text>
    </g>
  </g>
  <g>
    <rect class="raised" x="132" y="382" width="1016" height="88" rx="6"/>
    <text class="label" x="156" y="414">Alcance</text>
    <text class="small" x="156" y="443">Assist steering only below the pit speed threshold.</text>
    <rect x="978" y="405" width="54" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
    <path d="M993 436 L1010 419 L1018 427 L1001 444 L991 446 Z" fill="#aeb3bd"/>
    <rect x="1044" y="405" width="44" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
    <path d="M1057 419 L1075 437 M1075 419 L1057 437" stroke="#ff9c8f" stroke-width="3" stroke-linecap="round"/>
    <rect x="1100" y="405" width="44" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
    <path d="M1112 429 L1119 436 L1132 421" fill="none" stroke="#7ee2a8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g class="fade-in" style="animation-delay:1.1s">
      <rect x="972" y="404" width="176" height="44" rx="4" fill="#533f04" stroke="#f5cd47" stroke-width="2"/>
      <path d="M1005 441 L1020 426 L1027 433 L1012 448 L1003 450 Z" fill="#f5cd47"/>
      <text x="1076" y="433" text-anchor="middle" fill="#f5cd47" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Edited</text>
    </g>
  </g>
  <g>
    <rect class="raised" x="132" y="486" width="1016" height="88" rx="6"/>
    <text class="label" x="156" y="518">Criterios de aceptacion</text>
    <text class="small" x="156" y="547">Car remains controllable without auto-driving.</text>
    <rect x="978" y="509" width="54" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
    <path d="M993 540 L1010 523 L1018 531 L1001 548 L991 550 Z" fill="#aeb3bd"/>
    <rect x="1044" y="509" width="44" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
    <path d="M1057 523 L1075 541 M1075 523 L1057 541" stroke="#ff9c8f" stroke-width="3" stroke-linecap="round"/>
    <rect x="1100" y="509" width="44" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
    <path d="M1112 533 L1119 540 L1132 525" fill="none" stroke="#7ee2a8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <g class="fade-in" style="animation-delay:2s">
      <rect x="972" y="508" width="176" height="44" rx="4" fill="#5d1f1a" stroke="#ff9c8f" stroke-width="2"/>
      <path d="M1005 530 L1022 547 M1022 530 L1005 547" stroke="#ff9c8f" stroke-width="3" stroke-linecap="round"/>
      <text x="1076" y="537" text-anchor="middle" fill="#ff9c8f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Rejected</text>
    </g>
  </g>

  <line x1="98" y1="610" x2="1182" y2="610" stroke="#454852" stroke-width="2"/>
  <rect x="820" y="628" width="156" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
  <text x="898" y="655" text-anchor="middle" fill="#f4f5f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Reject remaining</text>
  <rect x="992" y="628" width="156" height="42" rx="4" fill="#0c66e4" stroke="#0c66e4" stroke-width="2"/>
  <text x="1070" y="655" text-anchor="middle" fill="#f4f5f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Accept remaining</text>
  
</svg>
