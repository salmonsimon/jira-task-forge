<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Manual versus sync catalog mode animation">
  <style>
    .bg { fill: #151719; }
    .panel { fill: #1d1f23; stroke: #454852; stroke-width: 2; }
    .raised { fill: #25272c; stroke: #454852; stroke-width: 2; }
    .input { fill: #22252a; stroke: #454852; stroke-width: 2; }
    .title { fill: #f4f5f7; font: 700 32px Inter, Segoe UI, Arial, sans-serif; }
    .label { fill: #f4f5f7; font: 600 18px Inter, Segoe UI, Arial, sans-serif; }
    .body { fill: #f4f5f7; font: 500 22px Inter, Segoe UI, Arial, sans-serif; }
    .small { fill: #aeb3bd; font: 500 16px Inter, Segoe UI, Arial, sans-serif; }
    .tiny { fill: #aeb3bd; font: 500 14px Inter, Segoe UI, Arial, sans-serif; }
    .mono { fill: #f4f5f7; font: 600 20px Consolas, Menlo, monospace; }
    .chip { fill: #1d355c; stroke: #31588f; stroke-width: 1.5; }
    .blue { fill: #0c66e4; }
    .green { fill: #7ee2a8; }
    .red { fill: #ff9c8f; }
    .amber { fill: #f5cd47; }
    .purple { fill: #b8a7ff; }
    .stroke-blue { stroke: #0c66e4; }
    .stroke-green { stroke: #7ee2a8; }
    .stroke-muted { stroke: #aeb3bd; }
    .fade-in { opacity: 0; animation: fade 6s infinite; }
    .draw { stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 6s infinite; }
    @keyframes fade {
      0%, 10% { opacity: 0; transform: translateY(8px); }
      20%, 72% { opacity: 1; transform: translateY(0); }
      90%, 100% { opacity: 0; transform: translateY(-4px); }
    }
    @keyframes draw {
      0%, 18% { stroke-dashoffset: 500; opacity: 0; }
      32%, 78% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
  </style>
  <rect class="bg" width="1280" height="720"/>
  
  <rect class="panel" x="164" y="52" width="952" height="616" rx="8"/>
  <rect x="164" y="52" width="952" height="82" rx="8" fill="#1d1f23"/>
  <line x1="164" y1="134" x2="1116" y2="134" stroke="#454852" stroke-width="2"/>
  <text class="title" x="204" y="92">Categories</text>
  <text class="small" x="204" y="119">Projects and areas available in capture controls</text>
  <path d="M1072 78 L1092 98 M1092 78 L1072 98" stroke="#aeb3bd" stroke-width="3" stroke-linecap="round"/>

  <text class="label" x="204" y="184">Areas</text>
  <g>
    <rect x="760" y="153" width="88" height="42" rx="21" fill="#303238" stroke="#454852" stroke-width="2"/>
    <circle cx="783" cy="174" r="16" fill="#ffffff">
      <animate attributeName="cx" values="783;825;825;783" keyTimes="0;.28;.72;1" dur="6s" repeatCount="indefinite"/>
    </circle>
    <path d="M775 181 L791 165 L799 173 L783 189 L773 191 Z" fill="#7f858f">
      <animate attributeName="opacity" values="1;0;0;1" keyTimes="0;.28;.72;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M815 174 C815 166 821 160 829 160 C835 160 840 163 843 168 M843 160 L843 170 L833 168" fill="none" stroke="#0c66e4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.28;.72;1" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>
  <rect x="866" y="153" width="98" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
  <text x="915" y="180" text-anchor="middle" fill="#f4f5f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Sync</text>
  <rect x="978" y="153" width="98" height="42" rx="4" fill="#303238" stroke="#454852" stroke-width="2"/>
  <text x="1027" y="180" text-anchor="middle" fill="#f4f5f7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">New</text>

  <g>
    <rect class="raised" x="204" y="222" width="872" height="86" rx="6"/>
    <text class="body" x="232" y="258">Gameplay</text>
    <text class="tiny" x="232" y="286">Local Area</text>
    <rect x="930" y="246" width="82" height="28" rx="4" fill="#533f04"/>
  <text x="971" y="265" text-anchor="middle" fill="#f5cd47" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Manual</text>
    <g class="fade-in" style="animation-delay:.3s">
      <rect x="224" y="267" width="176" height="24" fill="#25272c"/>
      <text class="tiny" x="232" y="286">Notion catalog</text>
      <rect x="920" y="238" width="136" height="44" fill="#25272c"/>
      <rect x="930" y="246" width="82" height="28" rx="4" fill="#183f2e"/>
  <text x="971" y="265" text-anchor="middle" fill="#7ee2a8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Synced</text>
    </g>
  </g>
  <g>
    <rect class="raised" x="204" y="324" width="872" height="86" rx="6"/>
    <text class="body" x="232" y="360">QA</text>
    <text class="tiny" x="232" y="388">Local Area</text>
    <rect x="930" y="348" width="82" height="28" rx="4" fill="#533f04"/>
  <text x="971" y="367" text-anchor="middle" fill="#f5cd47" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Manual</text>
    <g class="fade-in" style="animation-delay:.3s">
      <rect x="224" y="369" width="176" height="24" fill="#25272c"/>
      <text class="tiny" x="232" y="388">Notion catalog</text>
      <rect x="920" y="340" width="136" height="44" fill="#25272c"/>
      <rect x="930" y="348" width="82" height="28" rx="4" fill="#183f2e"/>
  <text x="971" y="367" text-anchor="middle" fill="#7ee2a8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Synced</text>
    </g>
  </g>

  <g class="fade-in" style="animation-delay:.3s">
    <rect x="204" y="442" width="872" height="154" rx="6" fill="#172b4d" stroke="#344563" stroke-width="2"/>
    <circle cx="242" cy="480" r="18" fill="#1d355c"/>
    <path d="M232 480 C232 472 238 466 246 466 C252 466 257 469 260 474 M260 466 L260 476 L250 474" fill="none" stroke="#85b8ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="label" x="276" y="480">Sync from Notion page</text>
    <text class="small" x="276" y="510">JTF Sync Catalog - My Copy</text>
    <text class="tiny" x="276" y="538">Owned top-level page selected in the OAuth picker</text>
    <rect x="856" y="548" width="190" height="32" rx="4" fill="#183f2e"/>
    <text x="880" y="570" fill="#7ee2a8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Catalog validated</text>
  </g>
  
</svg>
